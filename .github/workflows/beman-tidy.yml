# SPDX-License-Identifier: Apache-2.0 WITH LLVM-exception

name: beman-tidy tests

on:
  push:
    branches:
      - main
  pull_request:
  workflow_call:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *' # 09:00AM EEST

jobs:
  run_linter:
    name: Run Linter
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Sync environment
        run: |
          uv sync

      - name: Run linter
        run: |
          uv run ruff check --diff

  run_tests:
    name: Run Tests (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Sync environment
        run: |
          uv sync

      - name: Run tests
        run: |
          uv run pytest tests/ -v

  build_and_install:
    name: Build and Install (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Build and install beman-tidy
        run: |
          uv build
          uv tool install --force dist/*.whl
          beman-tidy --help

  create-issue-when-fault:
    needs: [run_linter, run_tests, build_and_install]
    if: failure() && (github.event_name == 'workflow_call' || github.event_name == 'workflow_dispatch' || github.event_name == 'schedule')
    uses: bemanproject/infra-workflows/.github/workflows/reusable-beman-create-issue-when-fault.yml@1.1.0
