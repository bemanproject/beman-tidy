# SPDX-License-Identifier: Apache-2.0 WITH LLVM-exception

name: Run on beman.exemplar

on:
  push:
    branches:
      - main
  pull_request:
  workflow_call:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *' # 09:00AM EEST

jobs:
  run_on_exemplar:
    name: Run on beman.exemplar (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Build and install beman-tidy
        run: |
          uv build
          uv tool install --force dist/*.whl
          beman-tidy --help

      - name: Run installed beman-tidy on cookiecutter output
        run: |
          git clone --depth=1 https://github.com/bemanproject/exemplar.git exemplar_repo
          cd exemplar_repo
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          bash ./stamp.sh project_name="cookiecutter_test" description="Test project" --no-input
          git remote remove origin
          python -c "import sys; lines = open('.beman-tidy.yaml').readlines(); f = open('.beman-tidy.yaml', 'w'); [f.write(l + '  - release.godbolt_trunk_version\n  - readme.implements\n' if 'disabled_rules:' in l else l) for l in lines]; f.close()"
          cd ..
          mv exemplar_repo cookiecutter_test
          cd cookiecutter_test
          beman-tidy --verbose --require-all .

  create-issue-when-fault:
    needs: [run_on_exemplar]
    if: failure() && (github.event_name == 'workflow_call' || github.event_name == 'workflow_dispatch' || github.event_name == 'schedule')
    uses: bemanproject/infra-workflows/.github/workflows/reusable-beman-create-issue-when-fault.yml@1.1.0
